<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — AKHLAK 360°</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="{{ url_for('static', filename='admin/vendor/fontawesome-free/css/all.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>

<body>
  <div class="login-page">
    <!-- Abstract Backgrounds -->
    <div class="bg-shape bg-shape-tr"></div>
    <div class="bg-shape bg-shape-bl"></div>
    <div class="bg-dots"></div>

    <div class="login-container">
      <!-- Left side: Branding (Text on background) -->
      <div class="login-left">
        <div class="login-badge">Penilaian 360&deg;</div>
        <h1 class="login-title">Penilaian Kinerja<br>360&deg; Core Values</h1>
        
        <!-- Custom AKHLAK Logo -->
        <div class="logo-akhlak-container">
          <img src="{{ url_for('static', filename='admin/img/Logo-AKHLAK-BUMN-PNG-Putih-Free-Download-jasalogocepatcom-01.png') }}" alt="Logo AKHLAK" class="logo-akhlak-img">
        </div>
      </div>
      
      <!-- Right side: Form (White Card) -->
      <div class="login-right">
        <div class="login-form-card">
          <h2 class="form-title">Welcome Back !</h2>
          
          {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
          {% for category, message in messages %}
          <div style="background:{% if category == 'danger' %}#fee2e2{% else %}#dbeafe{% endif %};color:{% if category == 'danger' %}#991b1b{% else %}#1e40af{% endif %};padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;margin-bottom:18px;display:flex;align-items:center;gap:8px;">
            <i class="fas {% if category == 'danger' %}fa-exclamation-circle{% else %}fa-info-circle{% endif %}"></i>
            {{ message }}
          </div>
          {% endfor %}
          {% endif %}
          {% endwith %}

          <form class="login-form" method="POST" action="{{ url_for('login') }}">
            <div class="input-group-custom">
              <div class="input-icon"><i class="far fa-envelope"></i></div>
              <input type="text" name="username" placeholder="Email or NIP" required autocomplete="username" autofocus>
            </div>

            <div class="input-group-custom">
              <div class="input-icon"><i class="fas fa-lock"></i></div>
              <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
              <div class="input-icon-right"><i class="far fa-eye"></i></div>
            </div>

            <button type="submit" class="btn-login-submit">Login</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
