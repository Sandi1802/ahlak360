{% extends "layout.html" %}
{% block title %}Edit Karyawan{% endblock %}
{% block content %}
<div class="page-header animate-in" style="--delay: 1">
    <h1>Edit Karyawan</h1>
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb breadcrumb-custom">
            <li class="breadcrumb-item"><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="{{ url_for('karyawan_list') }}">Karyawan</a></li>
            <li class="breadcrumb-item active" aria-current="page">Edit</li>
        </ol>
    </nav>
</div>

<div class="card animate-in" style="--delay: 2">
    <div class="card-header-custom">
        <h5 class="m-0 font-weight-bold text-primary">Edit Data Karyawan: {{ karyawan.nama }}</h5>
    </div>
    <div class="card-body">
        <form action="{{ url_for('edit_karyawan', id=karyawan.id_karyawan) }}" method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="nip" class="form-label font-weight-bold">NIP</label>
                    <input type="text" class="form-control" id="nip" name="nip" required value="{{ karyawan.nip }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="nama" class="form-label font-weight-bold">Nama Lengkap</label>
                    <input type="text" class="form-control" id="nama" name="nama" required value="{{ karyawan.nama }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="jabatan" class="form-label font-weight-bold">Jabatan</label>
                    <input type="text" class="form-control" id="jabatan" name="jabatan" required value="{{ karyawan.jabatan }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="departemen" class="form-label font-weight-bold">Departemen</label>
                    <input type="text" class="form-control" id="departemen" name="departemen" required value="{{ karyawan.departemen }}">
                </div>
                <div class="col-md-6 mb-4">
                    <label for="id_atasan" class="form-label font-weight-bold">Atasan Langsung (Opsional)</label>
                    <select class="form-select" id="id_atasan" name="id_atasan">
                        <option value="">-- Pilih Atasan --</option>
                        {% for a in atasan_list %}
                        <option value="{{ a.id_karyawan }}" {% if karyawan.id_atasan == a.id_karyawan %}selected{% endif %}>{{ a.nama }} - {{ a.jabatan }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <hr class="mb-4">
            
            <div class="d-flex justify-content-end gap-2">
                <a href="{{ url_for('karyawan_list') }}" class="btn btn-outline-primary"><i class="fas fa-arrow-left me-1"></i> Batal</a>
                <button type="submit" class="btn btn-accent"><i class="fas fa-save me-1"></i> Simpan Perubahan</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
